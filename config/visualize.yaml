common:
  data_path: "/home/vlmap_RCI/Data"
  data_type: "habitat_sim"
  save_image: true
  show_image: false
  visualize:
    # - "gt"
    - "obstacles"
    - "rgb"
    - "2DMap"
    # - "map"
    # - "instance"
    # - "instances_in_cat"
    # - "heatmap"
    # - "room"

  # below options are only used by instance-wise maps (ours/floodfill/dbscan).
  # lseg/seem always use 01buildFeatMap/obstacles_<version>.npy.
  using_categorized_map: true
  using_avg_height: true
  using_postprocessed_obstacles: true
  filtering_floor: false

  instances_to_visualize: []
  categories_to_visualize: []
  heatmap_type: "simscore"
  heatmap_target: []

  # Optional:
  # output_root: "/home/hong_RCI/vlmap/outputs/viz_batch"
  # If set, outputs are saved to:
  # <output_root>/<vlm>/<dataset_type>/<scene_id>_<version>/

runs:
  - vlm: "lseg"
    datasets:
      - dataset_type: "Replica"
        scenes:
          - scene_id: "office2"
            version: "longTimeNoSee_lseg"
            gt_version: "longTimeNoSee_gt"
      - dataset_type: "mp3d"
        scenes:
          - scene_id: "2t7WUuJeko7_2"
            version: "longTimeNoSee_lseg"
            gt_version: "longTimeNoSee_gt"
      - dataset_type: "hm3dsem"
        scenes:
          - scene_id: "00829-QaLdnwvtxbs"
            version: "longTimeNoSee_lseg"
            gt_version: "longTimeNoSee_gt"

  - vlm: "seem"
    datasets:
      - dataset_type: "Replica"
        scenes:
          - scene_id: "office2"
            version: "longTimeNoSee_seem"
            gt_version: "longTimeNoSee_gt"
      - dataset_type: "mp3d"
        scenes:
          - scene_id: "2t7WUuJeko7_2"
            version: "longTimeNoSee_seem"
            gt_version: "longTimeNoSee_gt"
      - dataset_type: "hm3dsem"
        scenes:
          - scene_id: "00829-QaLdnwvtxbs"
            version: "longTimeNoSee_seem"
            gt_version: "longTimeNoSee_gt"

  - vlm: "ours"
    datasets:
      - dataset_type: "Replica"
        scenes:
          - scene_id: "office2"
            version: "longTimeNoSee"
            gt_version: "longTimeNoSee_gt"
          - scene_id: "office2"
            version: "longTimeNoSee2"
            gt_version: "longTimeNoSee_gt"
      - dataset_type: "mp3d"
        scenes:
          - scene_id: "2t7WUuJeko7_2"
            version: "longTimeNoSee"
            gt_version: "longTimeNoSee_gt"
          - scene_id: "2t7WUuJeko7_2"
            version: "longTimeNoSee2"
            gt_version: "longTimeNoSee_gt"
      - dataset_type: "hm3dsem"
        scenes:
          - scene_id: "00829-QaLdnwvtxbs"
            version: "longTimeNoSee"
            gt_version: "longTimeNoSee_gt"
          - scene_id: "00829-QaLdnwvtxbs"
            version: "longTimeNoSee2"
            gt_version: "longTimeNoSee_gt"